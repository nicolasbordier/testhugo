baseURL = 'https://nicolasbordier.github.io/testhugo/'
languageCode = 'en-us'
title = 'My New Hugo Site'

[module]
    [[module.imports]]
        path = "github.com/colinwilson/lotusdocs"
        disable = false
    [[module.imports]]
        path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
        disable = false


[params]
    [params.docs]   
        darkMode = true

    [params.footer]
        copyright = "© :YEAR: Goldenhawk Motorsport."
        version = true # includes git commit info


[caches]
  [caches.images]
    dir = ':cacheDir/images'
    maxAge = 1